services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-url_db}
    depends_on:
      db:
        condition: service_healthy
    # 只對 host loopback 開 port，外部流量經過系統 nginx
    ports:
      - "127.0.0.1:8000:8000"

  db:
    image: postgres:16
    restart: unless-stopped
    # postgres image 內部要 POSTGRES_*，但 .env 沿用 DB_* 命名（跟 settings.py 一致），這裡做映射
    environment:
      POSTGRES_DB: ${DB_NAME:-url_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-url_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
