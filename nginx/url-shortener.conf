# 系統 nginx 設定（host 上的 /etc/nginx/sites-available/url-shortener）
#
# 部署時：
#   1. sudo cp nginx/url-shortener.conf /etc/nginx/sites-available/url-shortener
#   2. 把下面兩處 SITE_DOMAIN_PLACEHOLDER 換成你的網域
#   3. sudo ln -s /etc/nginx/sites-available/url-shortener /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare 真實 IP：把 $remote_addr 改寫成 CF-Connecting-IP
# IP 範圍來源：https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# 80 → 443 redirect
server {
    listen 80;
    server_name SITE_DOMAIN_PLACEHOLDER;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name SITE_DOMAIN_PLACEHOLDER;

    # Cloudflare Origin Certificate（系統共用位置）
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # 全部請求（含 /static/）反代給 web container；
    # 靜態檔由 Django 容器內的 WhiteNoise 服務（CompressedManifestStaticFilesStorage 已預壓縮）
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 顯式傳給 Django，services._get_client_ip 優先讀它
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }
}
